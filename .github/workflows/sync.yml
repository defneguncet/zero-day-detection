name: Sync to Hugging Face hub
on:
  push:
    branches: [main] # Eğer github dalının adı master ise burayı master yap

  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git push --force https://defneguncet:$HF_TOKEN@huggingface.co/spaces/defneguncet/zero-day-detection main